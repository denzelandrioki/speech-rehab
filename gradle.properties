org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8
# Меньше конфликтов с блокировкой файлов на Windows при processDebugResources / R.jar
# Если всё же «R.jar занят»: .\gradlew.bat --stop; закройте параллельную сборку в другой IDE; исключите папку проекта из Защитника Windows.
org.gradle.vfs.watch=false
# Параллельные задачи часто держат R.jar открытым; при «файл занят» оставьте false (на CI можно true).
org.gradle.parallel=false
# Один пул воркеров — меньше гонок за удалением промежуточных jar на Windows.
org.gradle.workers.max=1
android.useAndroidX=true
kotlin.code.style=official
android.nonTransitiveRClass=true
